body{
  background:#ffd9e6;
  font-family:Arial, Helvetica, sans-serif;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  margin:0;
}

.start-screen{
  position:fixed;
  inset:0;
  background:#ffd9e6;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  z-index:10;
}

.start-screen h1{
  margin-bottom:20px;
}

.start-btn{
  background:#ff9fbc;
  border:none;
  padding:14px 22px;
  border-radius:10px;
  font-size:16px;
  cursor:pointer;
}

.start-btn:hover{
  background:#ff7ea6;
}

.player{
  background:#E8FBE8;
  width:300px;
  border-radius:10px;
  padding:20px;
  box-shadow:0 10px 30px rgba(0,0,0,0.2);
  text-align:center;
}

.cd-slot{
  background:#bbb;
  border-radius:12px;
  padding:20px;
  margin-bottom:20px;
}

.cd{
  width:170px;
  height:170px;
  border-radius:50%;
  margin:auto;
  background-size:cover;
  background-position:center;
  position:relative;
  box-shadow:
    inset 0 0 25px rgba(0,0,0,0.35),
    0 6px 15px rgba(0,0,0,0.25);
}

/* shiny reflection */
.cd::before{
  content:"";
  position:absolute;
  inset:0;
  border-radius:50%;
  background:linear-gradient(120deg, rgba(255,255,255,0.35), rgba(255,255,255,0) 40%);
  pointer-events:none;
}

/* center hole of CD */
.cd::after{
  content:"";
  position:absolute;
  width:26px;
  height:26px;
  background:#9e9e9e;
  border-radius:50%;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  box-shadow:inset 0 0 6px rgba(0,0,0,0.6);
}

.spin{
  animation:spin 4s linear infinite;
}

@keyframes spin{
  from{transform:rotate(0deg)}
  to{transform:rotate(360deg)}
}

.track-name{
  font-size:16px;
  margin-bottom:15px;
}

.controls button{
  background:#BFEFFF;
  border:none;
  padding:10px 14px;
  margin:5px;
  border-radius:8px;
  cursor:pointer;
  font-weight:bold;
}

.controls button:hover{
  background:#E0F2FF;
}

.tracklist{
  margin-top:15px;
  max-height:200px;
  overflow-y:auto;
  text-align:left;
}

.track{
  padding:6px;
  cursor:pointer;
  border-radius:6px;
}

.track:hover{
  background:#F3E8FF;
}

.active{
  background:#ffb3cc;
}

.hidden{
  display:none;
}

let current=0

const audio=document.getElementById("audio")
const cd=document.getElementById("cd")
const trackName=document.getElementById("trackName")
const tracklist=document.getElementById("tracklist")
const startScreen=document.getElementById("startScreen")

function startPlayer(){
startScreen.classList.add("hidden")
loadTrack()
audio.play()
cd.classList.add("spin")
}

function loadTrack(i){
current=i
const t=tracks[i]
audio.src=t.file
cd.style.backgroundImage=`url(${t.cover})`
trackName.innerText=t.name
highlight()
}

function togglePlay(){
if(audio.paused){
audio.play()
cd.classList.add("spin")
}else{
audio.pause()
cd.classList.remove("spin")
}
}

function nextTrack(){
current=(current+1)%tracks.length
loadTrack(current)
audio.play()
cd.classList.add("spin")
}

function prevTrack(){
current=(current-1+tracks.length)%tracks.length
loadTrack(current)
audio.play()
cd.classList.add("spin")
}
audio.addEventListener("ended", function(){
nextTrack()
})

function toggleLoop(){
audio.loop = !audio.loop
let btn = document.getElementById("loopBtn")

if(audio.loop){
btn.style.background = "#E8FBE8"
}
else{
btn.style.background = "#FADADD"
}}

function highlight(){
const all=document.querySelectorAll(".track")
all.forEach((el,i)=>{
el.classList.toggle("active",i===current)
})
}

tracks.forEach((t,i)=>{
const div=document.createElement("div")
div.className="track"
div.innerText=t.name
div.onclick=()=>{
loadTrack(i)
audio.play()
cd.classList.add("spin")
}
tracklist.appendChild(div)
})
